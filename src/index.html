<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>ZAIRO CLUB</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Preload para que el loader cargue rápido -->
  <link rel="preload" as="image" href="/assets/zairo-loader-ring.png">
  <link rel="preload" as="image" href="/assets/zairo-loader-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #020503;
      overflow-x: hidden;
    }

    body {
      background:
        radial-gradient(circle at center, rgba(255, 184, 77, .14), transparent 30%),
        radial-gradient(circle at center, rgba(25, 255, 136, .10), transparent 46%),
        linear-gradient(180deg, #010302 0%, #041106 58%, #010302 100%);
    }

    app-root {
      display: block;
      min-height: 100dvh;
      background: #020503;
    }

    .zairo-start-loader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      width: 100vw;
      height: 100dvh;
      display: grid;
      place-content: center;
      justify-items: center;
      text-align: center;
      overflow: hidden;
      color: white;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at center, rgba(255, 184, 77, .16), transparent 30%),
        radial-gradient(circle at center, rgba(25, 255, 136, .12), transparent 46%),
        linear-gradient(180deg, #010302 0%, #041106 58%, #010302 100%);
    }

    .zairo-start-loader::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(25,255,136,.10), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(124,58,237,.10), transparent 34%);
      pointer-events: none;
    }

    .zairo-start-ring-wrap {
      position: relative;
      z-index: 2;
      width: min(230px, 58vw);
      height: min(230px, 58vw);
      display: grid;
      place-items: center;
      margin-bottom: 24px;
    }

    .zairo-start-ring {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      animation: zairoStartRingSpin 2.4s linear infinite;
      filter:
        drop-shadow(0 0 18px rgba(255, 184, 77, .42))
        drop-shadow(0 0 34px rgba(25, 255, 136, .18));
    }

    .zairo-start-logo-core {
      position: absolute;
      width: min(92px, 24vw);
      height: min(92px, 24vw);
      border-radius: 999px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle, rgba(255,184,77,.12), rgba(2,5,3,.82) 70%);
      border: 1px solid rgba(255, 184, 77, .35);
      box-shadow:
        inset 0 0 28px rgba(255,184,77,.14),
        0 0 28px rgba(255,184,77,.12),
        0 0 38px rgba(25,255,136,.14);
    }

    .zairo-start-logo {
      width: 88%;
      height: 88%;
      object-fit: contain;
      display: block;
      filter:
        drop-shadow(0 0 8px rgba(255,184,77,.32))
        drop-shadow(0 0 18px rgba(255,184,77,.18));
    }

    .zairo-start-loader p {
      position: relative;
      z-index: 2;
      margin: 12px 0 18px;
      padding: 0 28px;
      color: #d8eadf;
      font-size: 14px;
    }

    .zairo-start-loader span {
      position: relative;
      z-index: 2;
      color: #19ff88;
      font-weight: 950;
      letter-spacing: 3px;
      font-size: 10px;
    }

    .zairo-start-copy {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 4px;
}

.zairo-start-kicker {
  margin: 0;
  font-family: "Cinzel", serif;
  font-size: clamp(17px, 3.5vw, 28px);
  font-weight: 800;
  letter-spacing: clamp(5px, 1vw, 10px);
  color: #d8eadf;
  text-transform: uppercase;
  text-shadow:
    0 0 14px rgba(255, 184, 77, .25),
    0 0 26px rgba(25, 255, 136, .15);
}

.zairo-start-title {
    margin: 4px 0 0;
    font-family: "Unbounded", sans-serif;
    font-size: clamp(38px, 9vw, 82px);
    font-weight: 900;
    line-height: .9;
    letter-spacing: clamp(3px, .8vw, 8px);
    text-transform: uppercase;
    background: linear-gradient(
      180deg,
      #fff6c7 0%,
      #ffcf63 38%,
      #b87516 72%,
      #fff0a6 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 18px rgba(255, 184, 77, .35));
    text-shadow:
      0 0 24px rgba(255, 184, 77, .25),
      0 0 42px rgba(25, 255, 136, .12);
  }

    @keyframes zairoStartRingSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <app-root>
    <div class="zairo-start-loader">
      <div class="zairo-start-ring-wrap">
        <img
          src="/assets/zairo-loader-ring.png"
          alt="Cargando ZAIRO"
          class="zairo-start-ring">

        <div class="zairo-start-logo-core">
          <img
            src="/assets/zairo-loader-logo.png"
            alt="ZAIRO"
            class="zairo-start-logo">
        </div>
      </div>

      <div class="zairo-start-copy">
        <h2 class="zairo-start-kicker">WELCOME TO THE</h2>
        <h2 class="zairo-start-title">JUNGLE</h2>
      </div>
    </div>
  </app-root>
</body>
</html>
