<div *ngIf="visible" class="modal-overlay">
  <div class="modal-box">
    <h2>Cambiar contraseña</h2>

    <p>Usuario: <strong>{{ usuarioNombre }}</strong></p>

    <input
      type="password"
      placeholder="Nueva contraseña"
      [(ngModel)]="password">

    <input
      type="password"
      placeholder="Confirmar contraseña"
      [(ngModel)]="confirmPassword">

    <p *ngIf="error" class="error">{{ error }}</p>

    <div class="modal-actions">
      <button class="btn-primary" (click)="onConfirmar()">
        Guardar
      </button>

      <button class="btn-secondary" (click)="onCancelar()">
        Cancelar
      </button>
    </div>
  </div>
</div>
