<div class="login-page">
  <div class="login-card">
    <h1>ZAIRO Payroll</h1>
    <p>Inicia sesión para entrar al sistema</p>

    <div class="form-group">
      <label>Correo</label>
      <input
        [(ngModel)]="correo"
        name="correo"
        type="email"
        placeholder="correo@zairo.com" />
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input
        [(ngModel)]="password"
        name="password"
        type="password"
        placeholder="********" />
    </div>

    <p *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </p>

    <button (click)="login()" [disabled]="loading">
      {{ loading ? 'Ingresando...' : 'Ingresar' }}
    </button>
  </div>
</div>
