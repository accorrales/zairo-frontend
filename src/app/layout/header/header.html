<div class="header">
  <div class="header-left">

    <img
      src="https://i.postimg.cc/7P3gL7GF/ZAIRO-Lost-Trip-Logo.jpg"
      alt="ZAIRO Lost Trip">
      
    <span class="header-kicker">ZAIRO ADMIN</span>
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
  </div>

  <div class="header-right">
    <div class="user-box" *ngIf="usuario">
      <div class="avatar">
        {{ (usuario.nombre || usuario.correo || 'Z').charAt(0).toUpperCase() }}
      </div>

      <div>
        <span class="user-name">{{ usuario.nombre || usuario.correo }}</span>
        <span class="user-role">{{ usuario.rol }}</span>
      </div>
    </div>

    <button class="btn-logout" (click)="abrirLogout()">
      Cerrar sesión
    </button>
  </div>
</div>

<app-confirm-dialog
  [visible]="modalVisible"
  [titulo]="'Cerrar sesión'"
  [mensaje]="'¿Deseas cerrar la sesión actual?'"
  (confirmar)="confirmarLogout()"
  (cancelar)="cancelarLogout()">
</app-confirm-dialog>
